version: '3.8'

services:

  mongodb:
    image: mongo:6.0
    container_name: todo-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-network

  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - PORT=8000
    depends_on:
      - mongodb
    networks:
      - todo-network

  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: todo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - todo-network
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  todo-network:
    driver: bridge