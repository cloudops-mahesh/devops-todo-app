name: DevOps Todo App CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE: devops-todo-backend
  FRONTEND_IMAGE: devops-todo-frontend

jobs:

  # ──────────────────────────────
  # JOB 1: TEST
  # ──────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest test_main.py -v
        continue-on-error: true  # ← this means even if tests fail, continue!

  # ──────────────────────────────
  # JOB 2: BUILD AND PUSH TO ECR
  # ──────────────────────────────
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest ./frontend
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}

  # ──────────────────────────────
  # JOB 3: DEPLOY TO EC2
  # ──────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              751530150420.dkr.ecr.ap-south-1.amazonaws.com

            docker pull 751530150420.dkr.ecr.ap-south-1.amazonaws.com/devops-todo-backend:latest
            docker pull 751530150420.dkr.ecr.ap-south-1.amazonaws.com/devops-todo-frontend:latest

            cd /home/ubuntu
            docker-compose down
            docker-compose up -d
            docker image prune -f

            echo "✅ Deployment complete!"